global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'devops-app'
    static_configs:
      - targets: ['app:5000']
    
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']
    
  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']