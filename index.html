<!DOCTYPE html>
<html>
<head>
  <title>AI Code Generator + Runner</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
    textarea { width:100%; height:120px; padding:10px; }
    button { padding:10px; margin:5px; background:green; color:white; border:none; cursor:pointer; }
    pre { background:black; color:#0f0; padding:10px; margin-top:10px; }
    .box { background:#1e293b; padding:15px; margin-top:10px; border-radius:10px; }
  </style>
</head>

<body>

<h1>🤖 AI Code Generator + Runner</h1>

<div class="box">
  <h2>Enter Your Prompt</h2>
  <textarea id="prompt" placeholder="Example: addition function"></textarea><br/>
  <button onclick="generateCode()">Generate Code</button>
  <button onclick="runCode()">Run Code</button>
</div>

<div class="box">
  <h2>Generated Code</h2>
  <pre id="code"></pre>
</div>

<div class="box">
  <h2>Output</h2>
  <pre id="output"></pre>
</div>

<script>
let generatedCode = "";

async function generateCode() {
  const prompt = document.getElementById("prompt").value;

  const res = await fetch("/generate", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();
  generatedCode = data.code;
  document.getElementById("code").innerText = generatedCode;
}

async function runCode() {
  const res = await fetch("/run", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ code: generatedCode })
  });

  const data = await res.json();
  document.getElementById("output").innerText =
    data.output || data.error;
}
</script>

</body>
</html>
