apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-assistant
spec:
  replicas: 3
  selector:
    matchLabels:
      app: devops-assistant
  template:
    metadata:
      labels:
        app: devops-assistant
    spec:
      containers:
      - name: app
        image: yourusername/devops-assistant:latest
        ports:
        - containerPort: 5000
        env:
        - name: VERSION
          value: "1.0.0"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: devops-assistant-service
spec:
  selector:
    app: devops-assistant
  ports:
  - port: 80
    targetPort: 5000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-assistant-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-assistant
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50